<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정치인 홍보물 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 고화질 캡처를 위한 html2canvas 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #f3f4f6;
        }
        /* 캡처 시 불필요한 UI 숨김용 클래스 */
        .hide-on-capture {
            display: flex;
        }
        /* 이미지 영역 hover 효과 */
        .editable-image {
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .editable-image .overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            z-index: 50;
        }
        .editable-image:hover .overlay {
            opacity: 1;
        }
        .img-placeholder {
            background-color: #e5e7eb;
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col justify-center items-center min-h-screen gap-6">

    <!-- 상단 컨트롤 패널 (다운로드 버튼) -->
    <div class="bg-white p-4 rounded-xl shadow-md flex items-center justify-between w-full max-w-[1200px] hide-on-capture sticky top-4 z-50 border border-gray-200">
        <div>
            <h2 class="text-xl font-bold text-gray-800">📸 홍보물 생성기</h2>
            <p class="text-sm text-gray-500">이미지 영역을 클릭하여 내 사진으로 변경하세요.</p>
        </div>
        <button onclick="downloadHighRes()" class="bg-[#e60024] hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            초고화질 다운로드
        </button>
    </div>

    <!-- 캡처될 메인 영역 (id="capture-area") -->
    <div id="capture-area" class="bg-white w-full max-w-[1200px] border-[12px] border-[#e60024] p-6 md:p-10 flex flex-col lg:flex-row gap-10 shadow-2xl relative overflow-hidden">
        
        <!-- 왼쪽 영역 (45%): 포스터 이미지 삽입 영역 -->
        <div class="w-full lg:w-[45%] flex flex-col justify-center items-center z-10 bg-white shadow-sm border border-gray-100 overflow-hidden editable-image rounded-xl" onclick="document.getElementById('upload-poster').click()">
            <img id="main-poster-img" src="https://i.ibb.co/N2zBBgjK/Kakao-Talk-20260330-120127383.jpg" alt="후보자 포스터" class="w-full h-auto object-contain min-h-[600px] bg-gray-50">
            <div class="overlay rounded-xl">포스터 사진 변경</div>
            <input type="file" id="upload-poster" class="hidden" accept="image/*" onchange="handleImageUpload(event, 'main-poster-img', 'src')">
        </div>

        <!-- 오른쪽 영역 (55%): 활동 사진 4분할 그리드 -->
        <div class="w-full lg:w-[55%] grid grid-cols-2 grid-rows-2 gap-4 h-[600px] lg:h-auto min-h-[700px] p-4 bg-gray-50 rounded-2xl border border-gray-200">
            
            <!-- 활동 사진 1 -->
            <div class="editable-image rounded-xl shadow-md border-2 border-white w-full h-full" onclick="document.getElementById('upload-act1').click()">
                <div id="activity-img-1" class="img-placeholder w-full h-full rounded-lg" style="background-image: url('https://i.ibb.co/Zzv9k46M/Kakao-Talk-20260408-105516246.jpg');"></div>
                <div class="overlay rounded-lg">활동 사진 1 변경</div>
                <input type="file" id="upload-act1" class="hidden" accept="image/*" onchange="handleImageUpload(event, 'activity-img-1', 'bg')">
            </div>

            <!-- 활동 사진 2 -->
            <div class="editable-image rounded-xl shadow-md border-2 border-white w-full h-full" onclick="document.getElementById('upload-act2').click()">
                <div id="activity-img-2" class="img-placeholder w-full h-full rounded-lg" style="background-image: url('https://i.ibb.co/xt5ZMtTD/Kakao-Talk-20260330-121216575.png');"></div>
                <div class="overlay rounded-lg">활동 사진 2 변경</div>
                <input type="file" id="upload-act2" class="hidden" accept="image/*" onchange="handleImageUpload(event, 'activity-img-2', 'bg')">
            </div>

            <!-- 활동 사진 3 -->
            <div class="editable-image rounded-xl shadow-md border-2 border-white w-full h-full" onclick="document.getElementById('upload-act3').click()">
                <div id="activity-img-3" class="img-placeholder w-full h-full rounded-lg" style="background-image: url('https://i.ibb.co/xSFHGV9R/Kakao-Talk-20260327-103343620.jpg');"></div>
                <div class="overlay rounded-lg">활동 사진 3 변경</div>
                <input type="file" id="upload-act3" class="hidden" accept="image/*" onchange="handleImageUpload(event, 'activity-img-3', 'bg')">
            </div>

            <!-- 활동 사진 4 -->
            <div class="editable-image rounded-xl shadow-md border-2 border-white w-full h-full" onclick="document.getElementById('upload-act4').click()">
                <div id="activity-img-4" class="img-placeholder w-full h-full rounded-lg" style="background-image: url('https://i.ibb.co/xS3PSz29/Kakao-Talk-20260327-151656724.jpg');"></div>
                <div class="overlay rounded-lg">활동 사진 4 변경</div>
                <input type="file" id="upload-act4" class="hidden" accept="image/*" onchange="handleImageUpload(event, 'activity-img-4', 'bg')">
            </div>

        </div>

    </div>

    <script>
        // 파일 업로드 처리 함수
        function handleImageUpload(event, targetId, type) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imageUrl = e.target.result;
                const targetElement = document.getElementById(targetId);
                
                if (type === 'src') {
                    // 왼쪽 포스터용 (img 태그)
                    targetElement.src = imageUrl;
                } else if (type === 'bg') {
                    // 오른쪽 활동 사진용 (background-image)
                    targetElement.style.backgroundImage = `url('${imageUrl}')`;
                }
            };
            reader.readAsDataURL(file);
        }

        // 초고화질 다운로드 처리 함수
        function downloadHighRes() {
            // 버튼 상태 변경 (로딩 중)
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ 이미지 생성 중...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            const captureArea = document.getElementById('capture-area');

            // 마우스 hover 효과(overlay)가 캡처되지 않도록 임시로 클래스 제거 조치
            const editableImages = document.querySelectorAll('.editable-image');
            editableImages.forEach(el => el.classList.remove('editable-image'));

            // html2canvas 옵션: scale을 3으로 설정하여 3배수 초고화질(글자 깨짐 방지)로 렌더링
            html2canvas(captureArea, {
                scale: 3, 
                useCORS: true, 
                backgroundColor: '#ffffff'
            }).then(canvas => {
                // 다운로드 링크 생성 및 클릭
                const link = document.createElement('a');
                link.download = '정치인_홍보물_고화질.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // 원상 복구
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                editableImages.forEach(el => el.classList.add('editable-image'));
            }).catch(err => {
                console.error('캡처 중 오류 발생:', err);
                alert('이미지 생성 중 오류가 발생했습니다.');
                
                // 원상 복구
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                editableImages.forEach(el => el.classList.add('editable-image'));
            });
        }
    </script>
</body>
</html>
