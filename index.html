<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, noarchive, nofollow" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>홈페이지 임시 중단</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --red: #e61e2b;
      --bg: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      word-break: keep-all;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 440px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      margin-bottom: 18px;
      border-radius: 50%;
      background: #fff1f2;
      color: var(--red);
      font-size: 22px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main aria-labelledby="page-title">
    <div class="mark" aria-hidden="true">!</div>
    <h1 id="page-title">홈페이지가 임시로 열리지 않습니다.</h1>
    <p>현재 홈페이지 접속을 잠시 중단했습니다. 필요한 정리가 끝난 뒤 다시 열겠습니다.</p>
  </main>
</body>
</html>
